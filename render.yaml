services:
  - type: web
    name: smart-study-planner-backend
    env: node
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    autoDeploy: true
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: JWT_SECRET
        generateValue: true
      - key: FRONTEND_ORIGIN
        value: https://your-frontend.vercel.app
    disk:
      name: backend-data
      mountPath: /opt/render/project/src/backend/data
      sizeGB: 1
